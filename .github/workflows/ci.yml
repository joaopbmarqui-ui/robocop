name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Compile
        run: python -m compileall dispatch scr
      - name: Lint
        run: ruff check dispatch tests
      - name: Format check
        run: ruff format --check dispatch tests
      - name: Typecheck
        run: mypy dispatch
      - name: Help smoke
        run: python -m dispatch --help
      - name: Tests
        run: python -m pytest tests tools/prod_tui/tests -q
