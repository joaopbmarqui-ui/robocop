# robocop/edge_deploy.yaml
tool: robocop
repo_path: /ads_storage/dispatch
github_url: https://github.com/pedrochagasmaster/robocop.git
bitbucket_url: https://scm.mastercard.int/stash/scm/~e176097/dispatch.git
release_branch: main
runtime_paths: ["dispatch/**/*.py", "dispatch/**/*.tcss", "scr/**/*.py", "bin/dispatch", "bin/runtime_check.sh", "shared_runtime.py", "onboard.sh"]
compile_targets: "dispatch scr"
version_files: [VERSION, dispatch/version.py, pyproject.toml]
install_trigger_paths: [install.sh, shared_runtime.py, bin/dispatch, bin/runtime_check.sh, requirements.txt, pyproject.toml, VERSION, "dispatch/**"]
dependency_paths: [requirements.txt]
dependency_bundle:
  requirements_file: requirements.txt
  constraints_file: ""
  python_version: "3.10"
  implementation: cp
  abi: cp310
  platform: manylinux2014_x86_64
smoke:
  standard: ["/ads_storage/dispatch/bin/dispatch --help"]
  deep: ["<controlled Impala job>"]    # needs Kerberos
sensitive_paths: ["scr/"]
tui_chrome_regex: "Dispatch — Impala|Active Jobs|esc Back|n New Job"
tui_exit: dispatch_dynamic       # keep robocop's dashboard-aware return_to_shell (q at top, esc to pop)
